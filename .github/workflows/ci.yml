name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  client:
    name: Client Checks
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./client

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "./client/package-lock.json"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test:ci

      - name: Build
        run: npm run build

  server:
    name: Server Checks
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./server

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: battlestats
          POSTGRES_USER: django
          POSTGRES_PASSWORD: ci_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DB_ENGINE: postgresql_psycopg2
      DB_NAME: battlestats
      DB_USER: django
      DB_PASSWORD: ci_password
      DB_HOST: localhost
      DB_PORT: 5432
      DB_SSLMODE: ""
      DB_SSLROOTCERT: ""
      DJANGO_SECRET_KEY: ci-test-secret-key-do-not-use-in-production
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1
      REDIS_URL: redis://127.0.0.1:6379/1

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"
          cache-dependency-path: "./server/requirements.txt"

      - name: Setup Redis (for testing)
        uses: supercharge/redis-github-action@1.8.0
        with:
          redis-version: 5

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Tests
        run: |
          python -m pytest \
            warships/tests/test_views.py \
            warships/tests/test_landing.py \
            warships/tests/test_realm_isolation.py \
            warships/tests/test_data_product_contracts.py \
            -x --tb=short
