name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  client:
    name: Client Checks
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./client

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "./client/package-lock.json"

      - name: Install dependencies
        run: npm ci

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: ./client/.next/cache
          # Bust when deps or source change; restore-keys lets an older cache
          # warm an incremental build instead of a cold one.
          key: ${{ runner.os }}-nextjs-${{ hashFiles('./client/package-lock.json') }}-${{ hashFiles('./client/**/*.[jt]s', './client/**/*.[jt]sx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('./client/package-lock.json') }}-

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test:ci

      - name: Build
        run: npm run build

  server:
    name: Server Checks
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./server

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: battlestats
          POSTGRES_USER: django
          POSTGRES_PASSWORD: ci_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DB_ENGINE: postgresql_psycopg2
      DB_NAME: battlestats
      DB_USER: django
      DB_PASSWORD: ci_password
      DB_HOST: localhost
      DB_PORT: 5432
      DB_SSLMODE: ""
      DB_SSLROOTCERT: ""
      DJANGO_SECRET_KEY: ci-test-secret-key-do-not-use-in-production
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1
      REDIS_URL: redis://127.0.0.1:6379/1

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"
          cache-dependency-path: "./server/requirements.txt"

      - name: Setup Redis (for testing)
        uses: supercharge/redis-github-action@1.8.0
        with:
          redis-version: 5

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Tests
        env:
          DB_ENGINE: postgresql_psycopg2
          DB_NAME: battlestats
          DB_USER: django
          DB_PASSWORD: ci_password
          DB_HOST: localhost
          DB_PORT: 5432
          DB_SSLMODE: ""
          DB_SSLROOTCERT: ""
          DJANGO_SECRET_KEY: ci-test-secret-key-do-not-use-in-production
          DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1
          REDIS_URL: redis://127.0.0.1:6379/1
          # No RabbitMQ runs in CI. Without this override, settings.py falls back
          # to amqp://localhost:5672 and every task-dispatching test pays a broker
          # connection-retry cost — which inflated the test step to ~20 min. The
          # in-memory broker (same config the local release gate uses) keeps it
          # to seconds.
          CELERY_BROKER_URL: memory://
          CELERY_RESULT_BACKEND: cache+memory://
        # Full suite (~600 tests, ~15s on Postgres). Previously a hand-picked
        # 4-file subset ran here — the rest were fast but unrun, and the curated
        # file ordering masked cross-test isolation leaks (now fixed). No -x:
        # surface every failure, the run is seconds.
        run: python -m pytest warships/tests/ --tb=short
