name: Nightly Client Benchmarks

on:
  workflow_dispatch:
  schedule:
    - cron: "30 10 * * *"

permissions:
  contents: read

jobs:
  client-benchmarks:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CI: "true"
      BATTLESTATS_API_ORIGIN: ${{ secrets.BATTLESTATS_API_ORIGIN }}
      BATTLESTATS_BENCHMARK_TIMESTAMP: ${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate benchmark backend origin
        run: |
          if [ -z "$BATTLESTATS_API_ORIGIN" ]; then
            echo "BATTLESTATS_API_ORIGIN secret is required for nightly client benchmarks." >&2
            exit 1
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: client/package-lock.json

      - name: Install client dependencies
        working-directory: client
        run: npm ci

      - name: Install Playwright Chromium
        working-directory: client
        run: npx playwright install --with-deps chromium

      - name: Run live client benchmarks
        working-directory: client
        run: npm run test:e2e:benchmarks

      - name: Publish benchmark summary
        if: always()
        run: |
          node <<'NODE'
          const fs = require('fs');
          const summaryPath = process.env.GITHUB_STEP_SUMMARY;
          const benchmarkFiles = [
            ['Player route cold', 'client/test-results/playwright/benchmarks/player-route-cold-performance-live.json', 'routeToHeaderMs'],
            ['Profile charts live', 'client/test-results/playwright/benchmarks/profile-chart-performance-live.json', 'chartRequestToRenderMs'],
          ];

          const lines = ['## Client benchmark summary', ''];
          for (const [label, path, key] of benchmarkFiles) {
            if (!fs.existsSync(path)) {
              lines.push(`- ${label}: no artifact produced`);
              continue;
            }
            const payload = JSON.parse(fs.readFileSync(path, 'utf8'));
            const metric = payload.summary?.[key] || {};
            lines.push(`- ${label}: median ${metric.median ?? 'n/a'} ms, p95 ${metric.p95 ?? 'n/a'} ms, failures ${payload.failures?.length ?? 0}`);
          }

          fs.appendFileSync(summaryPath, `${lines.join('\n')}\n`);
          NODE

      - name: Upload benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: client-benchmark-artifacts-${{ github.run_id }}
          retention-days: 90
          path: |
            client/test-results/playwright/benchmarks/
            logs/benchmarks/client/
