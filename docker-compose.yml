services:
  db:
    profiles:
      - local-db
    container_name: battlestats-db
    image: postgres:15
    environment:
      POSTGRES_DB: battlestats
      POSTGRES_USER: django
      POSTGRES_PASSWORD: ${DB_PASSWORD:-XVIB58E5rWnAsU6}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    container_name: battlestats-redis
    image: "redis:7-alpine"
    ports:
      - "6379:6379"

  rabbitmq:
    container_name: battlestats-rabbitmq
    image: "rabbitmq:3-management"
    ports:
      - "5672:5672"
      - "15672:15672"
  server:
    build:
      context: server/
      dockerfile: Dockerfile
    container_name: battlestats-django
    command: >
      bash -c "python manage.py makemigrations &&
                  python manage.py migrate &&
                  if [ \"${WARM_LANDING_PAGE_ON_STARTUP:-1}\" = \"1\" ]; then
                    (sleep \"${LANDING_WARMUP_START_DELAY_SECONDS:-5}\"; python manage.py warm_landing_page_content) &
                  fi;
                  gunicorn --config gunicorn.conf.py battlestats.wsgi:application --bind 0.0.0.0:8888"
    volumes:
      - ./server:/usr/src/app
      - ./agents:/usr/src/agents:ro
    env_file:
      - server/.env
      - server/.env.secrets
    environment:
      - REDIS_URL=redis://redis:6379/0
      - WARM_LANDING_PAGE_ON_STARTUP=1
      - LANDING_WARMUP_START_DELAY_SECONDS=5
      - RANKED_INCREMENTAL_LIMIT=150
      - RANKED_INCREMENTAL_SKIP_FRESH_HOURS=24
      - RANKED_INCREMENTAL_KNOWN_LIMIT=300
      - RANKED_INCREMENTAL_DISCOVERY_LIMIT=75
    depends_on:
      - rabbitmq
      - redis
    ports:
      - "8888:8888" # Expose port 8888 for WSGI server

  react-app:
    build:
      context: client/
      dockerfile: Dockerfile
    container_name: battlestats-react
    environment:
      - BATTLESTATS_API_ORIGIN=http://server:8888
      - PORT=3001
      - HOSTNAME=0.0.0.0
    ports:
      - "3001:3001"
    volumes:
      - ./client:/app
      - client_node_modules:/app/node_modules
      - client_next_cache:/app/.next
    command: sh -c "rm -rf /app/.next/* && npm run dev -- --hostname 0.0.0.0 --port 3001"

  task-runner:
    container_name: battlestats-celery
    build:
      context: server/
      dockerfile: Dockerfile
    volumes:
      - ./server:/usr/src/app
      - ./agents:/usr/src/agents:ro
    command: celery -A battlestats worker -l INFO -Q default -c 6 --time-limit=600 --prefetch-multiplier=1 --max-tasks-per-child=200 --without-gossip --without-mingle -n hydration@%h
    env_file:
      - server/.env
      - server/.env.secrets
    environment:
      - REDIS_URL=redis://redis:6379/0
      - RANKED_INCREMENTAL_LIMIT=150
      - RANKED_INCREMENTAL_SKIP_FRESH_HOURS=24
      - RANKED_INCREMENTAL_KNOWN_LIMIT=300
      - RANKED_INCREMENTAL_DISCOVERY_LIMIT=75
    depends_on:
      - rabbitmq
      - redis

  task-runner-background:
    container_name: battlestats-celery-background
    build:
      context: server/
      dockerfile: Dockerfile
    volumes:
      - ./server:/usr/src/app
      - ./agents:/usr/src/agents:ro
    command: celery -A battlestats worker -l INFO -Q background -c 2 --time-limit=21600 --prefetch-multiplier=1 --max-tasks-per-child=50 --without-gossip --without-mingle -n background@%h
    env_file:
      - server/.env
      - server/.env.secrets
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - rabbitmq
      - redis

volumes:
  postgres_data:
  client_node_modules:
  client_next_cache:
