<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2171b5"/>
      <stop offset="100%" stop-color="#084594"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="32" height="32" rx="6" fill="url(#bg)"/>
  <!-- Crosshair ring -->
  <circle cx="16" cy="16" r="10" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
  <!-- Crosshair ticks -->
  <line x1="16" y1="4" x2="16" y2="7.5" stroke="rgba(255,255,255,0.3)" stroke-width="1.2"/>
  <line x1="16" y1="24.5" x2="16" y2="28" stroke="rgba(255,255,255,0.3)" stroke-width="1.2"/>
  <line x1="4" y1="16" x2="7.5" y2="16" stroke="rgba(255,255,255,0.3)" stroke-width="1.2"/>
  <line x1="24.5" y1="16" x2="28" y2="16" stroke="rgba(255,255,255,0.3)" stroke-width="1.2"/>
  <!-- Letter B -->
  <text x="16" y="22" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-weight="bold" font-size="18" fill="#ffffff" letter-spacing="-0.5">B</text>
</svg>
